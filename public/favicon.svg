<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ff2d78"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#07070f"/>
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- VR goggle body -->
  <rect x="2.5" y="10" width="27" height="14" rx="6" fill="url(#g)" opacity="0.12"/>
  <rect x="2.5" y="10" width="27" height="14" rx="6" fill="none" stroke="url(#g)" stroke-width="1.6"/>

  <!-- Left lens -->
  <rect x="4"   y="11.5" width="10.5" height="11" rx="4" fill="url(#g)" opacity="0.45"/>

  <!-- Right lens -->
  <rect x="17.5" y="11.5" width="10.5" height="11" rx="4" fill="url(#g)" opacity="0.45"/>

  <!-- Bridge between lenses -->
  <rect x="15" y="13" width="2" height="8" rx="1" fill="#07070f"/>

  <!-- Nose cutout at bottom center -->
  <path d="M13.5 24 Q16 27 18.5 24" fill="#07070f"/>

  <!-- Small music note dot on right lens (subtle) -->
  <circle cx="22.5" cy="17" r="1.5" fill="#07070f" opacity="0.5"/>
</svg>
